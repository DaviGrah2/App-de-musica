<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Wavefy</title>

    <link rel="stylesheet" href="Login.css">

</head>

<body class="BodyBegin">
    <main class="AppShell">
        <section class="HeroCard">
            <div class="HeroContent">
                <p class="TtBegin">Entre no Wavefy</p>
                <p class="Subtitle">Acesse sua conta e continue curtindo sua música favorita.</p>
                <form class="FormLogin" action="#" method="post">
                    <div class="FormGroup">
                        <label for="email" class="FormLabel">E-mail</label>
                        <input type="email" id="email" name="email" class="FormInput" placeholder="Digite seu e-mail" required>
                    </div>
                    <div class="FormGroup">
                        <label for="password" class="FormLabel">Senha</label>
                        <input type="password" id="password" name="password" class="FormInput" placeholder="Digite sua senha" required>
                    </div>
                    <div class="BtnBegin">
                        <a href="../HomePage/HomePage.html">
                        <button class="BtnEntrar" type="submit">Entrar</button>
                        </a>
                    </div>
                </form>
                <p class="LoginLink">Não tem uma conta? <a href="../CriarConta/CriarConta.html">Crie uma</a></p>
                <p class="ForgotLink"><a href="../EsqueceuSenha/ESqueceuSenha.html">Esqueceu a senha?</a></p>
            </div>
        </section>
    </main>
</body>

</html>
