<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Wavefy</title>

    <link rel="stylesheet" href="CriarConta.css">

</head>

<body class="BodyBegin">
    <main class="AppShell">
        <section class="HeroCard">
            <div class="HeroContent">
                <p class="TtBegin">Crie sua conta no Wavefy</p>
                <p class="Subtitle">Junte-se a milhões de usuários e descubra um mundo de música.</p>
                <form class="FormCreate" action="#" method="post">
                    <div class="FormGroup">
                        <label for="name" class="FormLabel">Nome completo</label>
                        <input type="text" id="name" name="name" class="FormInput" placeholder="Digite seu nome" required>
                    </div>
                    <div class="FormGroup">
                        <label for="email" class="FormLabel">E-mail</label>
                        <input type="email" id="email" name="email" class="FormInput" placeholder="Digite seu e-mail" required>
                    </div>
                    <div class="FormGroup">
                        <label for="password" class="FormLabel">Senha</label>
                        <input type="password" id="password" name="password" class="FormInput" placeholder="Crie uma senha" required>
                    </div>
                    <div class="FormGroup">
                        <label for="confirmPassword" class="FormLabel">Confirmar senha</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" class="FormInput" placeholder="Confirme sua senha" required>
                    </div>
                    <div class="BtnBegin">
                        <button class="BtnEntrar" type="submit">Criar conta</button>
                    </div>
                </form>
                <p class="LoginLink">Já tem uma conta? <a href="../Login/Login.html">Faça login</a></p>
            </div>
        </section>
    </main>
</body>

</html>
