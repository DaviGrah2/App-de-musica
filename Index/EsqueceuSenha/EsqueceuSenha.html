<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Wavefy</title>

    <link rel="stylesheet" href="EsqueceuSenha.css">

</head>

<body class="BodyBegin">
    <main class="AppShell">
        <section class="HeroCard">
            <div class="HeroContent">
                <p class="TtBegin">Recupere sua senha</p>
                <p class="Subtitle">Digite seu e-mail e enviaremos instruções para redefinir sua senha.</p>
                <form class="FormRecover" action="#" method="post">
                    <div class="FormGroup">
                        <label for="email" class="FormLabel">E-mail</label>
                        <input type="email" id="email" name="email" class="FormInput" placeholder="Digite seu e-mail" required>
                    </div>
                    <div class="BtnBegin">
                        <button class="BtnEntrar" type="submit">Enviar instruções</button>
                    </div>
                </form>
                <p class="BackLink"><a href="../Login/Login.html">Voltar ao login</a></p>
            </div>
        </section>
    </main>
</body>

</html>
